name: Publish Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (no actual publish)'
        required: false
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Define publish helper
        shell: bash
        run: |
          cat > /tmp/publish-package.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          package_dir="$1"
          dry_run="$2"

          package_name=$(node -p "require('./${package_dir}/package.json').name")
          local_version=$(node -p "require('./${package_dir}/package.json').version")
          published_version=$(npm view "$package_name" version 2>/dev/null || true)

          echo "package=$package_name local=$local_version published=${published_version:-unpublished}"

          if [[ -n "$published_version" && "$local_version" == "$published_version" ]]; then
            echo "Skipping $package_name because npm already has version $local_version"
            exit 0
          fi

          cd "$package_dir"
          bun run build
          unset NODE_AUTH_TOKEN
          rm -f "$NPM_CONFIG_USERCONFIG"
          if [[ "$dry_run" == "true" ]]; then
            npm publish --dry-run --provenance --access public
          else
            npm publish --provenance --access public
          fi
          EOF
          chmod +x /tmp/publish-package.sh

      # Tier 1: core (no internal deps)
      - name: Build and publish @fleettools/core
        run: |
          /tmp/publish-package.sh packages/core "${{ github.event.inputs.dry_run }}"

      # Tier 2: shared, db, squawk (depend only on core)
      - name: Build and publish @fleettools/shared
        run: |
          /tmp/publish-package.sh packages/shared "${{ github.event.inputs.dry_run }}"

      - name: Build and publish @fleettools/db
        run: |
          /tmp/publish-package.sh packages/db "${{ github.event.inputs.dry_run }}"

      - name: Build and publish @fleettools/squawk
        run: |
          /tmp/publish-package.sh squawk "${{ github.event.inputs.dry_run }}"

      # Tier 3: events (depends on core + db)
      - name: Build and publish @fleettools/events
        run: |
          /tmp/publish-package.sh packages/events "${{ github.event.inputs.dry_run }}"

      # Tier 4: cli (depends on core + shared)
      - name: Build and publish @fleettools/cli
        run: |
          /tmp/publish-package.sh packages/cli "${{ github.event.inputs.dry_run }}"

      # Tier 5: server/api (depends on core, shared, squawk, events, db)
      - name: Build and publish @fleettools/server
        run: |
          /tmp/publish-package.sh server/api "${{ github.event.inputs.dry_run }}"

      # Tier 6: plugins (no internal deps, can go any time)
      - name: Build and publish @fleettools/claude-code-plugin
        run: |
          /tmp/publish-package.sh plugins/claude-code "${{ github.event.inputs.dry_run }}"

      - name: Build and publish @fleettools/opencode-plugin
        run: |
          /tmp/publish-package.sh plugins/opencode "${{ github.event.inputs.dry_run }}"
