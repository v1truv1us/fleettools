name: Test OIDC Publishing

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to test'
        required: true
        type: choice
        options:
          - core
          - shared
          - db
          - events
          - cli
          - squawk
          - server
          - claude-code-plugin
          - opencode-plugin
      dry_run:
        description: 'Dry run only'
        required: false
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  test-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: bun install
      - name: Resolve package directory
        id: resolve
        run: |
          case "${{ github.event.inputs.package }}" in
            core)                echo "dir=packages/core" >> "$GITHUB_OUTPUT" ;;
            shared)              echo "dir=packages/shared" >> "$GITHUB_OUTPUT" ;;
            db)                  echo "dir=packages/db" >> "$GITHUB_OUTPUT" ;;
            events)              echo "dir=packages/events" >> "$GITHUB_OUTPUT" ;;
            cli)                 echo "dir=packages/cli" >> "$GITHUB_OUTPUT" ;;
            squawk)              echo "dir=squawk" >> "$GITHUB_OUTPUT" ;;
            server)              echo "dir=server/api" >> "$GITHUB_OUTPUT" ;;
            claude-code-plugin)  echo "dir=plugins/claude-code" >> "$GITHUB_OUTPUT" ;;
            opencode-plugin)     echo "dir=plugins/opencode" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Publish with OIDC
        env:
          NODE_AUTH_TOKEN: ""
        run: |
          bash scripts/ci/publish-package.sh "${{ steps.resolve.outputs.dir }}" "${{ github.event.inputs.dry_run }}"